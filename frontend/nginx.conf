server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/wasm;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    # unsafe-eval required for CesiumJS WebGL shader compilation
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; worker-src blob:; img-src 'self' data: blob: https:; connect-src 'self' https:; style-src 'self' 'unsafe-inline';";

    # proxy api requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # proxy static file requests (custom 3d models)
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # spa fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
