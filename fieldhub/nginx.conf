# single device-facing http port for the field hub. DJI Pilot 2 (real RC or an
# android emulator) reaches everything through http://<host>:8080. bucket paths
# go to minio (preserving the signed Host so presigned SigV4 urls validate),
# everything else to the fieldhub api + connect page.

events {}

http {
    # kmz + media originals can be large - don't cap the body
    client_max_body_size 0;

    # docker's embedded dns - re-resolve upstreams per request (valid=10s) so a
    # recreated fieldhub/minio container (new ip) is picked up without a restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8080;

        # object store - path-style addressing. preserve the signed Host
        # ($http_host) so presigned SigV4 urls validate at minio; a rewritten
        # Host breaks the signature.
        location ~ ^/(tarmacview-waylines|tarmacview-media)/ {
            set $minio_upstream minio:9000;
            proxy_pass http://$minio_upstream;
            proxy_set_header Host $http_host;
            proxy_buffering off;
        }

        # everything else - the fieldhub cloud api + the pilot connect page
        location / {
            set $fieldhub_upstream fieldhub:8800;
            proxy_pass http://$fieldhub_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
