services:
  postgres:
    image: postgres:16
    container_name: tarmacview-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tarmacview}
      POSTGRES_USER: ${POSTGRES_USER:-tarmacview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tarmacview}
    restart: unless-stopped
    # host port moved off the default 5432 to avoid colliding with a local
    # postgres; container-internal port stays 5432 (DATABASE_URL uses postgres:5432).
    # override with POSTGRES_HOST_PORT if even this collides.
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tarmacview} -d ${POSTGRES_DB:-tarmacview}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tarmacview-backend
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tarmacview}:${POSTGRES_PASSWORD:-tarmacview}@postgres:5432/${POSTGRES_DB:-tarmacview}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set - run start.sh / start.bat to generate .env.docker, or set it in your shell}
      # decrypts admin-managed secrets at rest (e.g. the elevation api key). copy the
      # value from backend/.env into .env.docker if you use the remote elevation api;
      # absent is fine - the elevation api fallback degrades to flat without it.
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
      # object storage + task broker. S3_ENDPOINT_URL empty = real AWS S3;
      # otherwise the in-compose minio. media uploads + result artifacts live here.
      # S3_PUBLIC_ENDPOINT is the browser-reachable url presigned upload/download
      # urls are signed against (host/LAN) - the browser can't resolve the
      # compose-internal minio hostname.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-tarmacview-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-tarmacview}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-tarmacview-minio}
      # offline base-map tiles served from the minio bundle (field profile).
      # online|cached|offline; offline never reaches the cdn. bundle key is
      # basemaps/{layer}.mbtiles in S3_BUCKET.
      TILE_MODE: ${TILE_MODE:-online}
      # Optional. The bundled seed ships the 5 demo airports, so this is
      # only needed for runtime "add airport by ICAO" lookups in the UI.
      # Provide via shell env or .env.docker; empty by default.
      OPENAIP_API_KEY: ${OPENAIP_API_KEY:-}
      # Field hub proxy. Defaults to the in-compose fieldhub so the backend stays
      # wired across recreates (the field profile brings the hub up alongside it);
      # when the hub isn't running the status endpoint degrades to offline on a
      # fast connection failure. Override/empty to fully detach.
      FIELDHUB_URL: ${FIELDHUB_URL:-http://fieldhub:8800}
      FIELDHUB_SHARED_SECRET: ${FIELDHUB_SHARED_SECRET:-}
      FIELDHUB_CA: ${FIELDHUB_CA:-}
    restart: unless-stopped
    volumes:
      - ./certs/fieldhub:/certs/fieldhub:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN:-}
        # field build points 2D map + 3D imagery at the same-origin tile endpoint;
        # empty default = cloud parity (esri/osm/ion).
        VITE_TILE_IMAGERY_URL: ${VITE_TILE_IMAGERY_URL:-}
        VITE_TILE_OSM_URL: ${VITE_TILE_OSM_URL:-}
        VITE_TILE_REFERENCE_URL: ${VITE_TILE_REFERENCE_URL:-}
        VITE_TILE_IMAGERY_ATTRIBUTION: ${VITE_TILE_IMAGERY_ATTRIBUTION:-}
        VITE_CESIUM_IMAGERY_URL: ${VITE_CESIUM_IMAGERY_URL:-}
        VITE_CESIUM_TERRAIN_URL: ${VITE_CESIUM_TERRAIN_URL:-}
    container_name: tarmacview-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # field profile - local dji cloud api stack (docker compose --profile field up).
  # wireless mission dispatch + media return per docs/specs/FIELD-HUB.md.
  # run scripts/field-hub/gen-certs.sh once before the first start.
  fieldhub:
    build:
      context: ./fieldhub
      dockerfile: Dockerfile
    container_name: tarmacview-fieldhub
    profiles: ["field"]
    # plain http behind the nginx proxy on :8080 - overrides the image's tls cmd
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8800"]
    env_file:
      - path: .env.docker
        required: false
    environment:
      # plain mqtt (no tls) to match the emqx tcp listener
      FIELDHUB_MQTT_ENABLED: "true"
      FIELDHUB_MQTT_HOST: emqx
      FIELDHUB_MQTT_PORT: "1883"
      FIELDHUB_MQTT_TLS: "false"
      FIELDHUB_MINIO_ENDPOINT: http://minio:9000
      FIELDHUB_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-tarmacview}
      FIELDHUB_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-tarmacview-minio}
      # lan-reachable minio url baked into presigned wayline downloads - set
      # to the laptop's lan ip (http://192.168.x.x:9000), never a compose hostname
      # both fed from one host var - the same lan address serves presigned
      # downloads and sts payloads
      FIELDHUB_MINIO_PUBLIC_ENDPOINT: ${FIELDHUB_MINIO_DEVICE_ENDPOINT:-}
      # device-facing object-store endpoint handed to pilot in sts payloads -
      # the laptop's lan ip (http://192.168.x.x:9000), never a compose hostname
      FIELDHUB_MINIO_DEVICE_ENDPOINT: ${FIELDHUB_MINIO_DEVICE_ENDPOINT:-}
      # backend base url for media-event reporting (compose-internal)
      FIELDHUB_BACKEND_URL: http://backend:8000
      FIELDHUB_SHARED_SECRET: ${FIELDHUB_SHARED_SECRET:-}
      # device registry lives in the shared postgres, own "fieldhub" schema
      FIELDHUB_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tarmacview}:${POSTGRES_PASSWORD:-tarmacview}@postgres:5432/${POSTGRES_DB:-tarmacview}
      # device-facing broker address handed to pilot at login - set this to
      # the laptop's lan ip (ssl://192.168.x.x:8883), never a compose hostname
      FIELDHUB_MQTT_DEVICE_ADDR: ${FIELDHUB_MQTT_DEVICE_ADDR:-}
      # pilot login account - login stays disabled while the password is empty
      FIELDHUB_PILOT_USERNAME: ${FIELDHUB_PILOT_USERNAME:-pilot}
      FIELDHUB_PILOT_PASSWORD: ${FIELDHUB_PILOT_PASSWORD:-}
      # dji developer app credentials the connect page verifies via jsbridge -
      # the page reports unconfigured while these are empty
      FIELDHUB_DJI_APP_ID: ${FIELDHUB_DJI_APP_ID:-}
      FIELDHUB_DJI_APP_KEY: ${FIELDHUB_DJI_APP_KEY:-}
      FIELDHUB_DJI_APP_LICENSE: ${FIELDHUB_DJI_APP_LICENSE:-}
    restart: unless-stopped
    # loopback-only direct port for debugging; device traffic goes via nginx :8080
    ports:
      - "127.0.0.1:8800:8800"
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8800/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # plain mqtt broker (no tls, anonymous) - pilot's thing module connects via
  # <host>:1883. device auth + tls are real-rc concerns, out of scope here.
  emqx:
    image: emqx/emqx:5.8.9
    container_name: tarmacview-emqx
    profiles: ["field"]
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - emqx-data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # single device-facing http port - routes pilot traffic to the fieldhub api +
  # connect page, and object-store bucket paths to minio (preserving the signed
  # Host so presigned downloads validate). pilot connects to http://<host>:8080.
  nginx:
    image: nginx:1.27-alpine
    container_name: tarmacview-nginx
    profiles: ["field"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./fieldhub/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fieldhub
      - minio

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: tarmacview-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tarmacview}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tarmacview-minio}
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # one-shot - create the media bucket on first boot (idempotent)
  minio-setup:
    image: minio/mc:latest
    container_name: tarmacview-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-tarmacview} ${MINIO_ROOT_PASSWORD:-tarmacview-minio} &&
      mc mb --ignore-existing local/${S3_BUCKET:-tarmacview-media} &&
      echo 'minio bucket ready'
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: tarmacview-redis
    restart: unless-stopped
    # host port moved off the default 6379 to avoid colliding with a local redis;
    # container-internal port stays 6379 (REDIS_URL uses redis:6379).
    # override with REDIS_HOST_PORT if even this collides.
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-56379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # celery worker - runs the vendored video-processing engine off the redis queue.
  # builds the worker image (backend app + opencv/celery/ffmpeg); shares the same
  # postgres + object store as the backend.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: tarmacview-worker
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tarmacview}:${POSTGRES_PASSWORD:-tarmacview}@postgres:5432/${POSTGRES_DB:-tarmacview}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-tarmacview-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-tarmacview}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-tarmacview-minio}
      # cap the native math/opencv thread pools so the prefork worker (concurrency 2) doesn't
      # oversubscribe cores - 2 jobs x 2 threads matches a 4-core docker desktop vm. raise
      # together with the worker's --concurrency if the host has more cores.
      OMP_NUM_THREADS: ${WORKER_OMP_THREADS:-2}
      OPENBLAS_NUM_THREADS: ${WORKER_OMP_THREADS:-2}
      MKL_NUM_THREADS: ${WORKER_OMP_THREADS:-2}
      VIDEO_CV_THREADS: ${WORKER_CV_THREADS:-2}
    restart: unless-stopped
    # decode the input + write the annotated outputs in a ram-backed scratch dir instead of
    # the virtualized overlay fs (docker desktop). cap it so a large clip can't exhaust ram.
    tmpfs:
      - /tmp:size=4g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  emqx-data:
  minio-data:
  redis-data:
