# pre-commit hooks — install with: pre-commit install
# bypass in emergencies: git commit --no-verify

# vendored verbatim reference — keep it byte-for-byte, never auto-format/lint/scan it
exclude: '^docs/reference/rel/analyze_runway_lights\.py$'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # local SAST — replaces the github-hosted CodeQL workflow (zero CI minutes)
  - repo: https://github.com/semgrep/semgrep
    rev: v1.167.0
    hooks:
      - id: semgrep
        args:
          - --config=p/python
          - --config=p/typescript
          - --config=p/react
          - --config=p/security-audit
          - --error
          - --skip-unknown-extensions
